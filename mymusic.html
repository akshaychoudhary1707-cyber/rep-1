  <script>
    let currentAudio = null;

    function playSong(id) {
      const audio = document.getElementById(id);
      const button = event.target;

      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        document.querySelectorAll(".play-btn").forEach(btn => btn.textContent = "Play");
      }

      if (audio.paused) {
        audio.play();
        button.textContent = "Pause";
        currentAudio = audio;
      } else {
        audio.pause();
        button.textContent = "Play";
      }

      audio.onended = () => {
        button.textContent = "Play";
      };
    }

    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const songList = document.getElementById('songList');

    searchButton.addEventListener('click', () => {
      const filter = searchInput.value.toLowerCase();
      const songs = songList.getElementsByTagName('li');
      Array.from(songs).forEach(song => {
        const title = song.querySelector('.song-title').textContent.toLowerCase();
        song.style.display = title.includes(filter) ? '' : 'none';
      });
    });

    // Optional: search on enter key in input box
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchButton.click();
      }
    });
  </script>
