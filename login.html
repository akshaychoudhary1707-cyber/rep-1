<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - My Music</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="head">
            <div class="logo">
                <img src="C:\Users\aksha\OneDrive\Documents\Music Site\musiclogo.jpg" /> 
            </div>
            <div class="name"> MY MUSIC </div>
    </header>
    <br>
    <br>
    <br>
    <center>
    <div class="box">
        <br>
        <label> Username: <br>
        <input type="text" name="username" placeholder="Enter your user name"></label>
        <br>
        <br>
        <label> Password: <br>
        <input type="password" name="password" placeholder="Enter Password"></label>
        <br>
        <br>
        <button type="submit">Login</button>
    </div>
    </center>
    
    <script>
        var username="Quill";
        var password="Quill@1stheaven";
      

        function login() {
            if (document.querySelector('input[name="username"]').value === username &&
            document.querySelector('input[name="password"]').value === password) {
                window.location.href = "mymusic.html";
            } else {
                alert("Wrong username or password");
            }
        }

        document.querySelector('button[type="submit"]').onclick = login;

    </script>
</body>
